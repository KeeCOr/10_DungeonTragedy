<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Dragon Tactics — Docs</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e0e10; color: #e6e6e6; margin: 0; }
    nav { position: sticky; top: 0; background: #1a1a1d; border-bottom: 1px solid #333;
      padding: 12px 24px; display: flex; gap: 16px; align-items: center; z-index: 10; }
    nav a { color: #88c0ff; text-decoration: none; padding: 6px 12px; border-radius: 4px; }
    nav a.active { background: #2a4a6a; color: #fff; }
    nav a:hover { background: #1f3a55; }
    main { max-width: 980px; margin: 0 auto; padding: 32px 24px 96px; }
    h1, h2, h3, h4 { color: #fff; line-height: 1.3; }
    h1 { border-bottom: 2px solid #444; padding-bottom: 8px; }
    h2 { margin-top: 40px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    h3 { margin-top: 28px; color: #d8d8d8; }
    code { background: #232328; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    pre { background: #181820; border: 1px solid #2a2a2f; border-radius: 6px;
      padding: 14px 16px; overflow-x: auto; line-height: 1.45; }
    pre code { background: transparent; padding: 0; font-size: 0.85em; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th, td { border: 1px solid #333; padding: 8px 12px; text-align: left; }
    th { background: #1f1f24; }
    tr:nth-child(even) { background: #16161a; }
    blockquote { border-left: 4px solid #4a7aaf; padding: 4px 16px; margin: 16px 0;
      background: #161922; color: #c8d6e8; }
    a { color: #88c0ff; }
    li { margin: 4px 0; }
    input[type=checkbox] { margin-right: 8px; transform: scale(1.1); }
    .hint { background: #1c2230; border: 1px solid #2c3a55; border-radius: 6px;
      padding: 12px 16px; margin-bottom: 24px; font-size: 0.9rem; color: #b8c8e0; }
    #status { color: #888; margin: 32px 0; }
  </style>
</head>
<body>
  <nav>
    <strong>Dragon Tactics Docs</strong>
    <a href="#spec" data-doc="specs/2026-04-21-dragon-tactics-design.md" class="active">설계 스펙</a>
    <a href="#plan" data-doc="plans/2026-04-21-dragon-tactics.md">구현 계획</a>
  </nav>
  <main>
    <div class="hint">
      이 페이지는 <code>.md</code> 원본 문서를 렌더링한 뷰입니다. 편집은 <code>docs/superpowers/</code> 아래 마크다운에서 진행하세요.
    </div>
    <article id="content">
      <p id="status">문서를 불러오는 중...</p>
    </article>
  </main>
  <script>
    const links = document.querySelectorAll('nav a[data-doc]');
    const content = document.getElementById('content');

    async function load(path, link) {
      links.forEach((l) => l.classList.toggle('active', l === link));
      content.innerHTML = '<p id="status">로딩 중...</p>';
      try {
        const url = `superpowers/${path}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        content.innerHTML = marked.parse(md);
      } catch (e) {
        content.innerHTML = `<p id="status">로드 실패: ${e.message}<br/>로컬 서버에서 열어주세요: <code>npm run serve</code> 후 <code>http://localhost:8000/docs/</code></p>`;
      }
    }

    links.forEach((link) => {
      link.addEventListener('click', (ev) => {
        ev.preventDefault();
        load(link.dataset.doc, link);
      });
    });
    load(links[0].dataset.doc, links[0]);
  </script>
</body>
</html>
